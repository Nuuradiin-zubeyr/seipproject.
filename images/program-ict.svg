<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="ICT illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4e8ac1"/>
      <stop offset="1" stop-color="#3b6fb6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>

  <!-- Nodes -->
  <g opacity="0.55" stroke="#4e8ac1" stroke-width="6">
    <circle cx="210" cy="220" r="14" fill="#4e8ac1"/>
    <circle cx="360" cy="170" r="14" fill="#4e8ac1"/>
    <circle cx="520" cy="240" r="14" fill="#4e8ac1"/>
    <circle cx="930" cy="260" r="14" fill="#4e8ac1"/>
    <circle cx="1030" cy="180" r="14" fill="#4e8ac1"/>
    <path d="M210 220 L360 170 L520 240"/>
    <path d="M520 240 L700 200 L930 260 L1030 180"/>
  </g>

  <!-- Laptop -->
  <rect x="240" y="290" width="720" height="420" rx="28" fill="#1a2a35"/>
  <rect x="275" y="330" width="650" height="330" rx="20" fill="#0f1720"/>
  <rect x="170" y="710" width="860" height="46" rx="23" fill="#cfd8e6"/>
  <rect x="420" y="756" width="360" height="18" rx="9" fill="#dfe8f4"/>

  <!-- Code marks -->
  <g stroke="url(#blue)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M410 495 L355 540 L410 585"/>
    <path d="M790 495 L845 540 L790 585"/>
    <path d="M560 610 L640 470"/>
  </g>

  <!-- Phone -->
  <rect x="900" y="520" width="140" height="230" rx="26" fill="#ffffff" stroke="#dbe6f4" stroke-width="8"/>
  <rect x="922" y="552" width="96" height="160" rx="18" fill="#eef6ff"/>
  <circle cx="970" cy="728" r="10" fill="#f19e38"/>
</svg>

